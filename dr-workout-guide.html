const state = {
  screen: 'phase',
  phase: null,
  dayId: null,
  metabolicOption: null,
  exIdx: 0,
  setsMap: {},
  weights: {},
  warmupChecked: [],
  timerSec: null,
  timerMax: null,
  timerInterval: null,
  history: [],
};

try {
  const saved = localStorage.getItem('wg_history');
  if (saved) state.history = JSON.parse(saved);
} catch (e) {}

// --- HELPERS ----------------------------------------------------------------

function saveHistory() {
  try { localStorage.setItem('wg_history', JSON.stringify(state.history)); } catch (e) {}
}

function getPhase() { return PHASES.find(p => p.id === state.phase); }
function getDay()   { return DAYS.find(d => d.id === state.dayId); }

function getActiveBlock() {
  // Returns the active "block" providing warmUp + exercises.
  // For metabolic, that's a METABOLIC entry. For lift, that's the DAY itself.
  const day = getDay();
  if (!day) return null;
  if (day.type === 'metabolic' && state.metabolicOption) return METABOLIC[state.metabolicOption];
  return day;
}

function getExercises() {
  const b = getActiveBlock();
  return (b && b.exercises) ? b.exercises : [];
}

function getExercise() { return getExercises()[state.exIdx]; }

function getRestSec(exercise) {
  if (!exercise || !exercise.restBase) return 0;
  const ph = getPhase();
  return Math.round(exercise.restBase * (ph ? ph.restMod : 1.0));
}

function formatRest(sec) {
  if (sec <= 0) return '\u2014';
  if (sec >= 120) return Math.round(sec / 60) + 'min';
  return Math.round(sec / 5) * 5 + 's';
}

function getCurrentSets() {
  const ex = getExercise();
  const sets = (ex && ex.sets) || 3;
  return state.setsMap[state.exIdx] || Array(sets).fill(false);
}

function getLastWeight(exName) {
  for (const s of state.history) {
    const m = (s.exercises || []).find(e => e.name === exName);
    if (m && m.weight) return m.weight;
  }
  return null;
}

function todayStr() {
  return new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function stopTimer() {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
  state.timerSec = null;
  state.timerMax = null;
}

const CIRC = 2 * Math.PI * 52;

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// --- AUDIO (bell) -----------------------------------------------------------

let audioCtx = null;
function getAudioCtx() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  } catch (e) {}
  return audioCtx;
}

function playBell() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const now = ctx.currentTime;
  const o1 = ctx.createOscillator(), g1 = ctx.createGain();
  o1.type = 'sine'; o1.frequency.value = 880;
  g1.gain.setValueAtTime(0.35, now);
  g1.gain.exponentialRampToValueAtTime(0.001, now + 1.6);
  o1.connect(g1).connect(ctx.destination);
  o1.start(now); o1.stop(now + 1.6);
  const o2 = ctx.createOscillator(), g2 = ctx.createGain();
  o2.type = 'sine'; o2.frequency.value = 1760;
  g2.gain.setValueAtTime(0.18, now);
  g2.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
  o2.connect(g2).connect(ctx.destination);
  o2.start(now); o2.stop(now + 0.9);
}

  switch (state.screen) {
    case 'phase':      app.innerHTML = renderPhase();      break;

    case 'metPicker':  app.innerHTML = renderMetPicker();  break;
    case 'warmup':     app.innerHTML = renderWarmup();     break;
    case 'info':       app.innerHTML = renderInfo();       break;
    case 'workout':    app.innerHTML = renderWorkout();    startWorkoutListeners(); break;
    case 'done':       app.innerHTML = renderDone();       break;
    case 'history':    app.innerHTML = renderHistory();    break;
  }
}

      </div>
      <div class="nav-row">
        <button class="nav-btn nav-btn-prev" id="btn-prev" onclick="goPrevEx()" ${state.exIdx === 0 ? 'disabled' : ''}>\u2039 Prev</button>
        <button class="nav-btn nav-btn-next" id="btn-next"
          style="${allDone ? `background:${ph.accent};color:#000` : ''}" onclick="goNextEx()">
          ${isLast ? 'Finish' : 'Next \u203A'}
        </button>
      </div>
    </div>`;
}

function renderDone() {
  const ph = getPhase();
  const day = getDay();
  const block = getActiveBlock();
  const last = state.history[0];
  const sessionName = (day && day.type === 'metabolic' && block) ? `${day.name} \u00B7 ${block.name}` : (day ? day.name : '');
  return `
    <div class="done-screen">
      <div class="done-check h" style="color:${ph.accent}">\u2713</div>
      <div class="done-title h">SESSION<br>COMPLETE</div>
      <div class="done-sub">${esc(sessionName)} \u00B7 ${esc(ph.name)}</div>
      <div class="done-date">${todayStr()}</div>
      ${last && last.exercises && last.exercises.length ? `
      <div class="session-summary">
        <div class="summary-title">Session Summary</div>
        ${last.exercises.map(ex => `
          <div class="summary-row">
            <span class="summary-ex">${esc(ex.name)}</span>
            <div class="summary-vals">
              ${ex.weight ? `<span class="summary-weight h" style="color:${ph.accent}">${esc(ex.weight)} lbs</span>` : '<span class="summary-reps">\u2014</span>'}
              <span class="summary-reps">${ex.sets}\u00D7${esc(ex.reps)}</span>
            </div>
          </div>`).join('')}
      </div>` : ''}
      <button class="done-btn done-btn-primary" onclick="anotherSession()">Another Session</button>
      <button class="done-btn done-btn-secondary" onclick="goPhase()">Change Phase</button>
      <button class="done-btn done-btn-ghost" onclick="goHistory()">View Full Log</button>
    </div>`;
}

function renderHistory() {
  return `
    <div class="screen">
      <div class="history-header">
        <div>
          <button class="back-btn" style="color:rgba(255,255,255,0.4);margin-bottom:10px" onclick="goPhase()">\u2190 Back</button>
          <div class="history-title h">SESSION LOG</div>
          <div class="history-count">${state.history.length} session${state.history.length !== 1 ? 's' : ''} saved</div>
        </div>
        ${state.history.length > 0 ? `<button class="clear-btn" onclick="clearHistory()">Clear All</button>` : ''}
      </div>
      <div class="history-list">
        ${state.history.length === 0
          ? '<div class="history-empty">No sessions yet. Complete a workout to see your log here.</div>'
          : state.history.map(s => {
              const phObj = PHASES.find(p => p.id === s.phase);
              const a = phObj ? phObj.accent : '#f97316';
              return `
              <div class="history-item">
                <div class="history-item-header">
                  <div>
                    <span class="history-item-name">${esc(s.dayName) || '\u2014'}</span>
                    <span class="history-item-phase">${esc(s.phaseName) || ''}</span>
                  </div>
                  <span class="history-item-date">${esc(s.date)}</span>
                </div>
                ${(s.exercises || []).map(ex => `
                  <div class="history-ex-row">
                    <span class="history-ex-name">${esc(ex.name)}</span>
                    <div class="history-ex-vals">
                      ${ex.weight ? `<span class="history-ex-weight h" style="color:${a}">${esc(ex.weight)} lbs</span>` : '<span class="history-ex-reps">\u2014</span>'}
                      <span class="history-ex-reps">${ex.sets}\u00D7${esc(ex.reps)}</span>
                    </div>
                  </div>`).join('')}
              </div>`;
            }).join('')}
      </div>
    </div>`;
}

// --- WORKOUT INTERACTIONS ---------------------------------------------------

function startWorkoutListeners() {
  const ws = document.getElementById('workout-screen');
  if (!ws) return;
  let tx = null, ty = null;
  ws.addEventListener('touchstart', e => {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
  }, { passive: true });
  ws.addEventListener('touchend', e => {
    if (tx === null) return;
    const dx = tx - e.changedTouches[0].clientX;
    const dy = ty - e.changedTouches[0].clientY;
    tx = null; ty = null;
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx > 0) goNextEx(); else goPrevEx();
    }
  }, { passive: true });
}

function onWeightInput(val) {
  state.weights[state.exIdx] = val;
  const input = document.getElementById('weight-input');
  const ph = getPhase();
  if (input) input.style.borderColor = val ? ph.accent + '60' : 'rgba(255,255,255,0.1)';
}

function tapSet(i) {
  getAudioCtx();
  const ex = getExercise();
  const sets = (ex && ex.sets) || 3;
  const cur = state.setsMap[state.exIdx] || Array(sets).fill(false);
  const next = [...cur];
  next[i] = !next[i];
  state.setsMap[state.exIdx] = next;

  const ph = getPhase();
  const btn = document.getElementById('set-' + i);
  if (btn) {
    btn.classList.toggle('done', next[i]);
    btn.style.background = next[i] ? ph.accent : 'transparent';
    btn.style.borderColor = next[i] ? ph.accent : 'rgba(255,255,255,0.14)';
    btn.style.color = next[i] ? '#000' : 'rgba(255,255,255,0.28)';
    btn.style.transform = next[i] ? 'scale(1.1)' : 'scale(1)';
    btn.textContent = next[i] ? '\u2713' : (i + 1);
  }

  const allDone = next.every(Boolean);
  const msg = document.getElementById('all-done-msg');
  if (msg) msg.style.display = allDone ? 'block' : 'none';

  const card = document.getElementById('ex-card');
  if (card) card.style.borderColor = allDone ? ph.accent + '55' : 'rgba(255,255,255,0.08)';

  const nextBtn = document.getElementById('btn-next');
  if (nextBtn) {
    nextBtn.style.background = allDone ? ph.accent : '#1a1a1a';
    nextBtn.style.color = allDone ? '#000' : '#fff';
  }

  const restSec = getRestSec(ex);
  if (next[i] && restSec > 0) startTimer(restSec);
  else stopTimerUI();
}

function startTimer(seconds) {
  stopTimer();
  state.timerSec = seconds;
  state.timerMax = seconds;
  const overlay = document.getElementById('timer-overlay');
  if (overlay) overlay.classList.add('visible');
  updateTimerUI();
  state.timerInterval = setInterval(() => {
    state.timerSec--;
    if (state.timerSec <= 0) { playBell(); stopTimerUI(); stopTimer(); }
    else updateTimerUI();
  }, 1000);
}

function updateTimerUI() {
  const num = document.getElementById('timer-num');
  const arc = document.getElementById('timer-arc');
  if (num) num.textContent = state.timerSec;
  if (arc && state.timerMax) {
    const progress = state.timerSec / state.timerMax;
    arc.style.strokeDashoffset = CIRC - CIRC * progress;
  }
}

function stopTimerUI() {
  const overlay = document.getElementById('timer-overlay');
  if (overlay) overlay.classList.remove('visible');
  stopTimer();
}

function skipRest() { stopTimerUI(); }

// --- WARMUP INTERACTIONS ----------------------------------------------------

function toggleWarmup(i) {
  getAudioCtx();
  const arr = state.warmupChecked.slice();
  arr[i] = !arr[i];
  state.warmupChecked = arr;
  render();
}

// --- NAVIGATION -------------------------------------------------------------

function selectPhase(id) {
  state.phase = id;
  state.screen = 'day';
  render();
}

function selectDay(id) {
  state.dayId = id;
  state.exIdx = 0;
  state.setsMap = {};
  state.weights = {};
  state.warmupChecked = [];
  state.metabolicOption = null;
  const day = getDay();
  if (!day) return;
  if (day.type === 'metabolic') {
    state.screen = 'metPicker';
  } else if (day.type === 'info') {
    state.screen = 'info';
  } else {
    state.screen = 'warmup';
  }
  render();
}

function selectMetabolic(id) {
  state.metabolicOption = id;
  state.exIdx = 0;
  state.setsMap = {};
  state.weights = {};
  state.warmupChecked = [];
  state.screen = 'warmup';
  render();
}

function backFromWarmup() {
  const day = getDay();
  if (day && day.type === 'metabolic') state.screen = 'metPicker';
  else state.screen = 'day';
  render();
}

function startWorkout() {
  state.screen = 'workout';
  render();
}

function goPhase()   { state.screen = 'phase';   render(); }
function goDay()     { state.screen = 'day';     state.metabolicOption = null; render(); }
function goHistory() { state.screen = 'history'; render(); }

function anotherSession() {
  state.exIdx = 0;
  state.setsMap = {};
  state.weights = {};
  state.warmupChecked = [];
  state.metabolicOption = null;
  state.screen = 'day';
  render();
}

function goPrevEx() {
  if (state.exIdx > 0) { stopTimerUI(); state.exIdx--; state.screen = 'workout'; render(); }
}

function goNextEx() {
  stopTimerUI();
  const exercises = getExercises();
  if (state.exIdx < exercises.length - 1) {
    state.exIdx++;
    state.screen = 'workout';
    render();
  } else {
    finishSession();
  }
}

function finishSession() {
  const ph = getPhase();
  const day = getDay();
  const block = getActiveBlock();
  const exercises = getExercises();
  const sessionName = (day && day.type === 'metabolic' && block) ? `${day.name} \u00B7 ${block.name}` : (day ? day.name : '');
  const session = {
    date: todayStr(),
    phase: state.phase,
    phaseName: ph ? ph.name : '',
    day: state.dayId,
    dayName: sessionName,
    exercises: exercises.map((ex, i) => ({
      name: ex.name,
      weight: state.weights[i] || null,
      sets: (state.setsMap[i] || []).filter(Boolean).length,
      reps: ex.reps || '\u2014',
    })),
  };
  state.history = [session, ...state.history].slice(0, 100);
  saveHistory();
  state.screen = 'done';
  render();
}

function logInfoSession() {
  const ph = getPhase();
  const day = getDay();
  if (!day) return;
  const session = {
    date: todayStr(),
    phase: state.phase,
    phaseName: ph ? ph.name : '',
    day: state.dayId,
    dayName: day.name,
    exercises: [],
  };
  state.history = [session, ...state.history].slice(0, 100);
  saveHistory();
  state.screen = 'done';
  render();
}

function clearHistory() {
  if (confirm('Clear all session history?')) {
    state.history = [];
    saveHistory();
    render();
  }
}

// --- INIT -------------------------------------------------------------------

render();

// --- SERVICE WORKER (offline / installable PWA) ----------------------------
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'dr-plan-v1';
    self.addEventListener('install', () => self.skipWaiting());
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(ks =>
        Promise.all(ks.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.open(CACHE).then(cache =>
          cache.match(e.request).then(cached => {
            const network = fetch(e.request).then(res => { cache.put(e.request, res.clone()); return res; }).catch(() => cached);
            return cached || network;
          })
        )
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}
</script>
